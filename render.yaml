services:
  - type: web
    name: matchmind26
    runtime: python
    plan: free
    buildCommand: >-
      pip install -e ".[app]" &&
      python -c "from wc26_predictor.api.main import tournament_payload, _all_match_reports; tournament_payload(); _all_match_reports(); print('caches prebuilt')"
    startCommand: uvicorn wc26_predictor.api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
